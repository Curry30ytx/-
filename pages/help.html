<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>帮助中心</title>
    <style>
        .help-container { max-width: 800px; margin: 0 auto; }
        .help-container h2 { color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .help-section { margin: 20px 0; padding: 15px; background: #f8f9ff; border-radius: 8px; }
        .help-section h3 { color: #555; margin-bottom: 10px; }
        .help-section p { color: #666; line-height: 1.8; font-size: 14px; }
        .help-section code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        .faq-item { margin: 10px 0; padding: 10px; border-left: 3px solid #667eea; background: #fff; }
        .faq-item .q { font-weight: bold; color: #333; }
        .faq-item .a { color: #666; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="help-container">
        <h2>帮助中心</h2>
        <p style="color:#999;font-size:14px;">欢迎使用用户管理系统，以下是一些常见问题的帮助说明。</p>

        <div class="help-section">
            <h3>一、账号相关</h3>
            <div class="faq-item">
                <div class="q">问：如何注册账号？</div>
                <div class="a">点击导航栏的「注册」按钮，填写用户名、密码、邮箱和手机号即可完成注册。</div>
            </div>
            <div class="faq-item">
                <div class="q">问：忘记密码怎么办？</div>
                <div class="a">请联系管理员重置密码。</div>
            </div>
        </div>

        <div class="help-section">
            <h3>二、充值相关</h3>
            <div class="faq-item">
                <div class="q">问：如何充值？</div>
                <div class="a">登录后进入「个人中心」，在充值表单中输入金额点击充值即可。</div>
            </div>
            <div class="faq-item">
                <div class="q">问：充值金额有限制吗？</div>
                <div class="a">单次充值金额不能超过 100,000 元。</div>
            </div>
        </div>

        <div class="help-section">
            <h3>三、文件上传</h3>
            <div class="faq-item">
                <div class="q">问：支持哪些文件格式？</div>
                <div class="a">仅支持 JPG、PNG、GIF 格式的图片文件。</div>
            </div>
            <div class="faq-item">
                <div class="q">问：文件大小有限制吗？</div>
                <div class="a">单个文件最大不能超过 2MB。</div>
            </div>
        </div>

        <div class="help-section">
            <h3>四、联系我们</h3>
            <p>如遇到其他问题，请联系网站管理员获取帮助。</p>
        </div>
    </div>
</body>
</html>
