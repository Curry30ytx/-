<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">用户管理系统</div>
        <div class="nav-menu">
            <a href="/login" class="nav-link">登录</a>
            <a href="/register" class="nav-link">注册</a>
        </div>
    </nav>

    <main class="container">
        <div class="card login-card">
            <h2>用户注册</h2>
            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="text" id="phone" name="phone" placeholder="请输入手机号" required>
                </div>
                <button type="submit" class="btn btn-primary">注 册</button>
            </form>
            <p class="text-muted" style="margin-top:16px;">
                已有账号？<a href="/login" style="color:#667eea;">去登录</a>
            </p>
        </div>
    </main>
</body>
</html>
